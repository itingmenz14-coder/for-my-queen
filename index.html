<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday! ✨</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #120a0d;
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        /* 1. LAYAR UTAMA KADO (PORTRAIT) */
        .cover-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffeef2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: all 1.2s ease;
        }

        .gift-box {
            font-size: 90px;
            cursor: pointer;
            display: inline-block;
            animation: goyangKado 1.5s infinite ease-in-out;
            user-select: none;
        }

        @keyframes goyangKado {
            0%, 100% { transform: rotate(0deg) scale(1); }
            20% { transform: rotate(-10deg); }
            40% { transform: rotate(7deg); }
            60% { transform: rotate(-6deg); }
            80% { transform: rotate(4deg) scale(1.05); }
        }

        .cover-screen h1 {
            color: #ff6b8b;
            font-family: Arial, sans-serif;
            font-size: 22px;
            margin-top: 25px;
        }

        /* 2. LAYAR ANIMASI TEKS & BUNGA BERPUTAR */
        .letter-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #120a0d;
            display: none; /* Muncul setelah kado diklik */
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            text-align: center;
            color: #f7d6dc;
            padding: 30px;
            box-sizing: border-box;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .sub-title {
            font-style: italic;
            font-size: 14px;
            color: #a38288;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .main-title {
            font-size: 32px;
            font-weight: normal;
            color: #ffb3c6;
            margin-bottom: 20px;
            min-height: 40px;
            white-space: pre-wrap;
        }

        .desc-text {
            font-size: 13px;
            color: #8c7075;
            max-width: 300px;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .spinning-flower {
            font-size: 45px;
            display: inline-block;
            animation: putarBunga 6s linear infinite;
            margin-bottom: 40px;
            filter: drop-shadow(0 0 10px rgba(255, 179, 198, 0.4));
        }

        @keyframes putarBunga {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .scroll-next {
            font-size: 12px;
            color: #ff6b8b;
            letter-spacing: 3px;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            animation: kedip 1.5s infinite;
            cursor: pointer;
        }

        @keyframes kedip {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        /* 3. BACKGROUND UTAMA FOTO */
        .bg-flowers {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #1a0f13;
            background-image: radial-gradient(rgba(255, 107, 139, 0.1) 1px, transparent 0);
            background-size: 40px 40px;
            z-index: 1;
        }

        /* WADAH SLIDE FOTO */
        .main-slider {
            width: 100%;
            height: 100%;
            display: none; /* 🔒 DIKUNCI SEMBUNYI DULU agar tidak bocor di awal */
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            position: relative;
            z-index: 2;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .slide-page {
            min-width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            scroll-snap-align: start;
            box-sizing: border-box;
            padding: 20px;
        }

        .background-canva {
            max-width: 95%;
            max-height: 95vh;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* MAWAR MEMANCAR */
        .rose-petal {
            position: fixed;
            pointer-events: none;
            z-index: 99999;
            font-size: 26px;
            user-select: none;
        }

        @keyframes memancar {
            0% { transform: translate(0, 0) scale(0.3) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(1.2) rotate(720deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="cover-screen" id="cover">
        <div class="gift-box" id="box" onclick="bukaKado()">🎁</div>
        <h1>Ada kado spesial buat kamu... 💖</h1>
    </div>

    <div class="letter-screen" id="letterView">
        <div class="sub-title">✏️ a love letter in bloom</div>
        <div class="main-title" id="typewriter"></div>
        <div class="desc-text">Every petal holds a whisper of how much you mean to me. Wishing you the happiest birthday ever.</div>
        <div class="spinning-flower">🌸</div>
        <div class="scroll-next" onclick="masukKeFoto()">LIHAT SCRAPBOOK KITA ➔</div>
    </div>

    <div class="bg-flowers"></div>

    <div class="main-slider" id="photoSlider">
        <div class="slide-page">
            <img src="1.png" class="background-canva" alt="Halaman 1">
        </div>
        <div class="slide-page">
            <img src="2.png" class="background-canva" alt="Halaman 2">
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="mp3.mp3" type="audio/mpeg">
    </audio>

    <script>
        const teksKetik = "For You,\nMy Everything"; 
        let indexTeks = 0;

        function bukaKado() {
            var audio = document.getElementById('bgMusic');
            audio.play().catch(e => console.log("Musik aktif"));

            semburanMawar();

            var cover = document.getElementById('cover');
            var letterView = document.getElementById('letterView');
            
            cover.style.opacity = '0';
            setTimeout(() => {
                cover.style.display = 'none';
                letterView.style.display = 'flex';
                setTimeout(() => {
                    letterView.style.opacity = '1';
                    mulaiKetik();
                }, 50);
            }, 1000);
        }

        function mulaiKetik() {
            if (indexTeks < teksKetik.length) {
                document.getElementById("typewriter").innerHTML += teksKetik.charAt(indexTeks);
                indexTeks++;
                setTimeout(mulaiKetik, 120);
            }
        }

        // 🛠️ URUTAN DIPERBAIKI DI SINI: Foto baru akan dipanggil setelah tombol diklik
        function masukKeFoto() {
            var letterView = document.getElementById('letterView');
            var photoSlider = document.getElementById('photoSlider');
            
            letterView.style.opacity = '0';
            setTimeout(() => {
                letterView.style.display = 'none';
                
                // Sekarang aktifkan wadah foto dan buat efek transisinya mulus (fade-in)
                photoSlider.style.display = 'flex';
                setTimeout(() => {
                    photoSlider.style.opacity = '1';
                }, 50);
            }, 1000);
        }

        function semburanMawar() {
            const bunga = ['🌹', '🌸', '❤️', '💐'];
            const jumlahMawar = 60;

            for (let i = 0; i < jumlahMawar; i++) {
                const petal = document.createElement('div');
                petal.classList.add('rose-petal');
                petal.innerText = bunga[Math.floor(Math.random() * bunga.length)];
                petal.style.left = '50%';
                petal.style.top = '50%';
                
                const sudut = Math.random() * Math.PI * 2;
                const jarak = Math.random() * 250 + 120;
                const x = Math.cos(sudut) * jarak + 'px';
                const y = Math.sin(sudut) * jarak + 'px';
                
                petal.style.setProperty('--x', x);
                petal.style.setProperty('--y', y);
                petal.style.animation = 'memancar 1.2s forwards cubic-bezier(0.1, 0.8, 0.3, 1)';
                
                document.body.appendChild(petal);
                setTimeout(() => petal.remove(), 1200);
            }
        }
    </script>

</body>
</html>
