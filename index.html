<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! ✨</title>
    <style>
        /* Mengatur agar halaman web pas di layar HP dan tidak ada jarak kosong */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffeef2; /* Warna pink pastel lembut sebagai latar belakang luar */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            font-family: Arial, sans-serif;
        }

        /* Pembungkus utama agar halaman web rapi saat dibuka di HP */
        .container {
            width: 100%;
            max-width: 600px; /* Ukuran ideal agar desain Canva lanskap kamu tidak kekecilan di HP */
            padding: 10px;
            box-sizing: border-box;
        }

        /* Mengatur gambar desain Canva agar responsif dan tidak pecah */
        .background-canva {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 12px; /* Memberikan efek lengkung estetik di pojok gambar */
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1); /* Memberikan efek bayangan halus */
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Menampilkan gambar hasil download Canva kamu -->
        <img src="desain-canva.png" class="background-canva" alt="Scrapbook Birthday">
    </div>

    <!-- Sistem pemutar audio (lagu akan otomatis mengulang jika habis) -->
    <audio id="bgMusic" loop>
        <source src="lagu.mp3" type="audio/mpeg">
        Browser kamu tidak mendukung pemutar audio.
    </audio>

    <script>
        // Trik pintar: Lagu langsung berputar otomatis begitu layar HP disentuh/diklik pertama kali
        function putarLagu Otomatis() {
            var audio = document.getElementById('bgMusic');
            audio.play().then(function() {
                console.log("Musik berhasil berputar otomatis!");
            }).catch(function(error) {
                console.log("Gagal autoplay karena aturan browser, menunggu sentuhan user.");
            });
        }

        // Mendeteksi sentuhan pertama di layar HP
        document.addEventListener('click', putarLaguOtomatis, { once: true });
        document.addEventListener('touchstart', putarLaguOtomatis, { once: true });
    </script>

</body>
</html>
