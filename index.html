<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday! ✨</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffeef2;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* LAYAR PEMBUKA (PORTRAIT) */
        .cover-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffeef2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
            transition: opacity 1s ease, visibility 1s;
        }

        .gift-box {
            font-size: 90px;
            cursor: pointer;
            display: inline-block;
            animation: goyangKado 1.5s infinite ease-in-out;
            user-select: none;
            position: relative;
            z-index: 10;
        }

        @keyframes goyangKado {
            0%, 100% { transform: rotate(0deg) scale(1); }
            20% { transform: rotate(-10deg); }
            40% { transform: rotate(7deg); }
            60% { transform: rotate(-6deg); }
            80% { transform: rotate(4deg) scale(1.05); }
        }

        .cover-screen h1 {
            color: #ff6b8b;
            font-size: 22px;
            margin-top: 25px;
            margin-bottom: 5px;
        }

        /* 📱 WADAH INSTRUKSI ROTASI HP (BARU) */
        .rotate-container {
            display: none; /* Sembunyi dulu */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: munculAlami 0.5s ease-out forwards;
        }

        @keyframes munculAlami {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        /* Animasi HP Berputar Gede */
        .phone-icon {
            font-size: 70px;
            margin-bottom: 15px;
            animation: putarHP 2s infinite ease-in-out;
            display: inline-block;
        }

        @keyframes putarHP {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(90deg); }
            100% { transform: rotate(90deg); }
        }

        .rotate-instruction {
            color: #ff6b8b;
            font-weight: bold;
            font-size: 20px;
            line-height: 1.5;
            padding: 0 20px;
        }

        .rotate-sub {
            color: #888;
            font-size: 13px;
            margin-top: 10px;
        }

        /* BACKGROUND UTAMA (TABURAN BUNGA STATIS) */
        .bg-flowers {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffeef2;
            background-image: 
                radial-gradient(rgba(255, 107, 139, 0.15) 1px, transparent 0),
                radial-gradient(rgba(255, 182, 193, 0.2) 2px, transparent 0);
            background-size: 40px 40px;
            background-position: 0 0, 20px 20px;
            z-index: 1;
        }

        /* WADAH SLIDE LANDSCAPE */
        .main-slider {
            width: 100%;
            height: 100%;
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            position: relative;
            z-index: 2;
        }

        .slide-page {
            min-width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            scroll-snap-align: start;
            box-sizing: border-box;
            padding: 20px;
        }

        .background-canva {
            max-width: 95%;
            max-height: 95vh;
            width: auto;
            height: auto;
            object-fit: contain;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        /* ELEMEN MAWAR YANG MEMANCAR & JATUH */
        .rose-petal {
            position: fixed;
            pointer-events: none;
            z-index: 99999;
            font-size: 26px;
            user-select: none;
        }

        @keyframes memancar {
            0% { transform: translate(0, 0) scale(0.3) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--x), var(--y)) scale(1.2) rotate(720deg); opacity: 0; }
        }

        @keyframes hujan {
            0% { top: -20px; transform: translateX(0) rotate(0deg); opacity: 1; }
            100% { top: 105vh; transform: translateX(100px) rotate(360deg); opacity: 0.2; }
        }
    </style>
</head>
<body>

    <div class="cover-screen" id="cover">
        <div class="gift-box" id="box" onclick="bukaKado()">🎁</div>
        <h1 id="coverText">Ada kado spesial buat kamu... 💖</h1>
        
        <div class="rotate-container" id="rotateWrapper">
            <div class="phone-icon">📱➔🔁</div>
            <div class="rotate-instruction">Aktifkan Auto-Rotate &<br>Putar HP Kamu ke Samping Ya! 🔄</div>
            <div class="rotate-sub">(Atau ketuk layar sekali lagi untuk lanjut)</div>
        </div>
    </div>

    <div class="bg-flowers"></div>

    <div class="main-slider">
        <div class="slide-page">
            <img src="1.png" class="background-canva" alt="Halaman 1">
        </div>
        <div class="slide-page">
            <img src="2.png" class="background-canva" alt="Halaman 2">
        </div>
    </div>

    <audio id="bgMusic" loop>
        <source src="mp3.mp3" type="audio/mpeg">
    </audio>

    <script>
        function bukaKado() {
            var audio = document.getElementById('bgMusic');
            audio.play().catch(e => console.log("Musik aktif"));

            semburanMawar();

            // Sembunyikan kado lama, munculkan instruksi rotasi baru
            document.getElementById('box').style.display = 'none';
            document.getElementById('coverText').style.display = 'none';
            document.getElementById('rotateWrapper').style.display = 'flex';

            // Deteksi otomatis jika diputar
            window.addEventListener("orientationchange", function() {
                if (window.orientation === 90 || window.orientation === -90) {
                    hilangkanCover();
                }
            });

            // Jalan pintas jika malas putar HP atau pakai laptop: klik area layar mana saja
            document.getElementById('cover').onclick = function(e) {
                if (e.target.id !== 'box') { 
                    hilangkanCover();
                }
            };
        }

        function hilangkanCover() {
            var cover = document.getElementById('cover');
            cover.style.opacity = '0';
            setTimeout(() => {
                cover.style.visibility = 'hidden';
                hujanMawarSantai();
            }, 800);
        }

        function semburanMawar() {
            const bunga = ['🌹', '🌸', '❤️', '💐'];
            const jumlahMawar = 60;

            for (let i = 0; i < jumlahMawar; i++) {
                const petal = document.createElement('div');
                petal.classList.add('rose-petal');
                petal.innerText = bunga[Math.floor(Math.random() * bunga.length)];
                petal.style.left = '50%';
                petal.style.top = '50%';
                
                const sudut = Math.random() * Math.PI * 2;
                const jarak = Math.random() * 250 + 120;
                const x = Math.cos(sudut) * jarak + 'px';
                const y = Math.sin(sudut) * jarak + 'px';
                
                petal.style.setProperty('--x', x);
                petal.style.setProperty('--y', y);
                petal.style.animation = 'memancar 1.2s forwards cubic-bezier(0.1, 0.8, 0.3, 1)';
                
                document.body.appendChild(petal);
                setTimeout(() => petal.remove(), 1200);
            }
        }

        function hujanMawarSantai() {
            const bunga = ['🌹', '🌸', '❤️'];
            setInterval(() => {
                const petal = document.createElement('div');
                petal.classList.add('rose-petal');
                petal.innerText = bunga[Math.floor(Math.random() * bunga.length)];
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.top = '-20px';
                petal.style.animation = 'hujan 5s linear forwards';
                petal.style.fontSize = (Math.random() * 15 + 15) + 'px';
                
                document.body.appendChild(petal);
                setTimeout(() => petal.remove(), 5000);
            }, 500);
        }
    </script>

</body>
</html>
