<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday! ✨</title>
    <style>
        /* Mengunci layar agar tidak ada margin tersisa */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffeef2;
            font-family: Arial, sans-serif;
            overflow: hidden; /* Mengunci scroll default */
        }

        /* LAYAR PEMBUKA (COVER) - Dibuat Penuh 1 Layar */
        .cover-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #ffeef2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            transition: opacity 0.8s ease, visibility 0.8s;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .cover-screen h1 {
            color: #ff6b8b;
            font-size: 26px;
            margin-bottom: 10px;
        }

        .cover-screen p {
            color: #777;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .open-btn {
            background-color: #ff6b8b;
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(255, 107, 139, 0.4);
            cursor: pointer;
            animation: denyut 1.5s infinite;
        }

        @keyframes denyut {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* WADAH UTAMA UNTUK SLIDE - Efek Magnet Per Halaman */
        .main-slider {
            width: 100%;
            height: 100%;
            overflow-y: scroll;
            scroll-snap-type: y mandatory; /* Membuat scroll otomatis mengunci per halaman */
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        /* SETIAP HALAMAN FOTO (Selalu 100% Layar) */
        .slide-page {
            width: 100%;
            height: 100vh; /* Pas setinggi layar HP/Laptop user */
            display: flex;
            justify-content: center;
            align-items: center;
            scroll-snap-align: start; /* Mengunci halaman di awal */
            box-sizing: border-box;
            padding: 10px; /* Jarak aman tipis agar foto tidak kepotong poni HP */
        }

        /* Mengatur Foto Agar Menyesuaikan Layar Secara Penuh */
        .background-canva {
            width: 100%;
            height: 100%;
            object-fit: contain; /* Foto akan membesar semaksimal mungkin tanpa terpotong */
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <!-- HALAMAN COVER DEPAN -->
    <div class="cover-screen" id="cover">
        <h1>Ada kejutan buat kamu... 💖</h1>
        <p>Silakan klik tombol di bawah ini ya!</p>
        <button class="open-btn" onclick="bukaKado()">✨ Buka Kado ✨</button>
    </div>

    <!-- WADAH SLIDE HALAMAN PENH -->
    <div class="main-slider">
        <!-- HALAMAN 1 -->
        <div class="slide-page">
            <img src="1.png" class="background-canva" alt="Scrapbook Foto 1">
        </div>
        
        <!-- HALAMAN 2 -->
        <div class="slide-page">
            <img src="2.png" class="background-canva" alt="Scrapbook Foto 2">
        </div>
    </div>

    <!-- AUDIO -->
    <audio id="bgMusic" loop>
        <source src="mp3.mp3" type="audio/mpeg">
    </audio>

    <script>
        function bukaKado() {
            var audio = document.getElementById('bgMusic');
            audio.play();

            var cover = document.getElementById('cover');
            cover.style.opacity = '0';
            cover.style.visibility = 'hidden';
        }
    </script>

</body>
</html>
